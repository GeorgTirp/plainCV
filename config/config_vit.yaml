seed: 0
print_progress: false

#dataset: "tiny_imagenet"   # or "tiny_imagenet"
#batch_size: 64
#image_size: 64             # TinyImageNet uses 64; override when switching datasets
#num_epochs: 12
#num_channels: 3            # TinyImageNet uses 3 channels
#num_classes: 200            # TinyImageNet uses 200 classes

dataset: "fashion_mnist"   # or "tiny_imagenet"
batch_size: 64
image_size: 28            
num_epochs: 10
num_channels: 1            
num_classes: 10           

model: "resnet_small"  # or "mlp", "vit_small", "small_resnet", "resnet18"

# Vision Transformer defaults (only used if model starts with "vit")
vit_patch_size: 4
vit_hidden_size: 128
vit_mlp_dim: 256
vit_layers: 4
vit_heads: 4
vit_dropout: 0.1
vit_use_layernorm: true
vit_use_batchnorm: false

# ResNet defaults
resnet_use_batchnorm: true

optim: muon  # or "muon", "adam", "soap", "pns_eigenadam", "pns_eigenadam_exp", "hessian_free", "sophia", "sophia_shampoo"
lr: 0.001
weight_decay: 0.01
beta1: 0.9
beta2: 0.9

# Optional Muon-specific fields (all have defaults):
muon_beta: 0.95
muon_ns_steps: 5
muon_ns_coeffs: [3.4445, -4.7750, 2.0315]
muon_nesterov: true
muon_adaptive: false


hf_cg_max_iters: 15   
hf_cg_tol: 1e-2      # looser tolerance
hf_damping: 1e-2

# --- PN-S EigenAdam–specific hyperparameters ---
#pns_sketch_dim: 128
pns_curvature_update_every: 64 
curvature_eigenvectors: 8       
curvature_iters: 8
gradient_eigenvectors: 6              
gradient_iters: 6
pns_precond_damping: 1.0e-4
pns_sqrt_scaling: false       
pns_curvature_backend: ggn  # or "hessian", "ggn", "fisher", "svgd"
pns_log_curvature: true
pns_split_spaces: false
pns_lr_top: 0.001
pns_lr_perp: 0.001
pns_base_optimizer: adamw  # one of: "adam", "adamw", "nadamw", "nesterovw", "sgd", "rmsprop"
pns_batched: False
pns_eigensolver: block_oi
pns_block_iters: 4

# --- Generic eigen tracking (works with any optimizer) ---
eigen_tracking_enabled: true
eigen_tracking_every: 5
eigen_tracking_topk: 8
eigen_tracking_extra_modes: 0
eigen_tracking_lanczos_iters: null
eigen_tracking_backend: ggn
eigen_tracking_sort_by_abs: null
eigen_tracking_light_ortho: false
eigen_tracking_light_ortho_every: 4

# --- Adaptive PN-S EigenAdam (used by optim: pns_eigenadam_adaptiv) ---
pns_innovation_enabled: true
pns_innovation_threshold: 0.333
pns_innovation_check_every: 10
pns_innovation_num_probes: 1
pns_innovation_probe: gradient
pns_innovation_eps: 1.0e-8
pns_innovation_use_damping: true
pns_subspace_tracking_enabled: False
pns_subspace_tracking_every: 10
pns_subspace_tracking_alpha: 0.1
pns_subspace_tracking_power_iters: 1
pns_subspace_tracking_on_probe_steps: true
pns_eigenvalue_keep_threshold: 5.0
pns_freeze_subspace_after_threshold: true
pns_keep_at_least_one_eigenpair: True

# --- Experimental PN-S EigenAdam (used by optim: pns_eigenadam_exp) ---
# Top-(k-1) eigenspace EMA + EOS-based automatic complement LR:
# EOS-based automatic complement LR from last tracked top-k eigenvalue:
pns_perp_eos_enabled: true
pns_perp_eos_gamma: 1.0
pns_perp_eos_ema: 0.1
pns_perp_eos_min: 1.0e-6
pns_perp_eos_max: 1.0
pns_lanczos_warm_start: true
pns_lanczos_light_ortho: true
pns_lanczos_light_ortho_every: 4


# --- Sophia-specific hyperparameters ---
rho: 0.01
clip_threshold: 1
hessian_update_every: 10
hutchinson_samples: 1

schedule_free: False
schedule_free_lr: 0.01
schedule_free_b1: 0.9
schedule_free_weight_lr_power: 2.0
